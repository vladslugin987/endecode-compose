name: Refresh Rust Vendor Bundle

on:
  workflow_dispatch:

jobs:
  vendor:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: endecode-tauri/src-tauri

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Prepare CI cargo config (no vendored source yet)
        run: |
          mkdir -p .cargo
          cat > .cargo/config.toml <<'EOF'
          [http]
          check-revoke = false

          [net]
          git-fetch-with-cli = true
          EOF

      - name: Generate lock file
        run: cargo generate-lockfile

      - name: Build vendor bundle
        run: |
          mkdir -p vendor-bundle/.cargo
          cargo vendor vendor > vendor-bundle/.cargo/config.toml
          cp -R vendor vendor-bundle/vendor
          cp Cargo.lock vendor-bundle/Cargo.lock
          cp Cargo.toml vendor-bundle/Cargo.toml

      - name: Pack vendor bundle
        run: |
          tar -czf endecode-tauri-rust-vendor.tar.gz -C vendor-bundle .

      - name: Upload vendor artifact
        uses: actions/upload-artifact@v4
        with:
          name: endecode-tauri-rust-vendor
          path: endecode-tauri/src-tauri/endecode-tauri-rust-vendor.tar.gz
          if-no-files-found: error
          compression-level: 0
